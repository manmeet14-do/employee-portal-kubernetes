kind: Deployment
apiVersion: apps/v1

metadata:
   name: employee-app-deloyment
   namespace: employee-app

spec:
   replicas: 4


   selector:
       matchLabels:
           app: employee-app



   template:
      metadata:
         labels:
             app: employee-app


      spec:
        containers:
          - name: employee-container
            image: employee-portal:latest
            imagePullPolicy: Never
            ports:
              - containerPort: 5000
