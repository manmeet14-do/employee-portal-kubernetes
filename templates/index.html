<!DOCTYPE html>
<html>
<head>
    <title>Employee Portal</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f5f5f5;
            margin:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
        }

        h1{
            color:#2c3e50;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
        }

        th{
            background:#3498db;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Employee Portal</h1>

<p>Welcome to Employee Management System</p>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.id }}</td>
        <td>{{ emp.name }}</td>
        <td>{{ emp.department }}</td>
    </tr>
    {% endfor %}

</table>

</div>

</body>
</html>
